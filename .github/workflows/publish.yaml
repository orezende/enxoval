name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces

      - name: Publish all packages
        run: |
          for workspace in $(npm query .workspace --json | jq -r '.[].location'); do
            pkg=$(node -p "require('./$workspace/package.json').name")
            ver=$(node -p "require('./$workspace/package.json').version")
            published=$(npm view "$pkg@$ver" version 2>/dev/null || echo "")
            if [ -z "$published" ]; then
              echo "Publishing $pkg@$ver"
              npm publish "./$workspace" --access public
            else
              echo "Skipping $pkg@$ver (already published)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  discover:
    name: Discover services that use @enxoval/*
    needs: publish
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.find.outputs.repos }}
    steps:
      - name: Find repos with @enxoval/* dependencies
        id: find
        env:
          GH_TOKEN: ${{ secrets.DUNE_LAB_TOKEN }}
        run: |
          REPOS="[]"
          for repo in $(gh repo list dune-lab --json name -q '.[].name' --limit 100 || echo ""); do
            content=$(gh api repos/dune-lab/$repo/contents/package.json -q '.content' 2>/dev/null || echo "")
            [ -z "$content" ] && continue
            has_enxoval=$(echo "$content" | base64 -d 2>/dev/null | jq -r '(.dependencies // {}) + (.devDependencies // {}) | to_entries[] | select(.key | startswith("@enxoval/")) | .key' 2>/dev/null || echo "")
            [ -n "$has_enxoval" ] && REPOS=$(echo "$REPOS" | jq --arg r "$repo" '. + [$r]')
          done
          echo "repos=$REPOS" >> $GITHUB_OUTPUT
          echo "Repos found: $REPOS"

  bump:
    name: Bump @enxoval/* in ${{ matrix.repo }}
    needs: [publish, discover]
    if: ${{ needs.discover.outputs.repos != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.repos) }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: enxoval

      - uses: actions/checkout@v4
        with:
          repository: dune-lab/${{ matrix.repo }}
          token: ${{ secrets.DUNE_LAB_TOKEN }}
          path: service

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Collect published @enxoval versions
        id: versions
        working-directory: enxoval
        run: |
          UPDATES=""
          for workspace in $(node -p "require('./package.json').workspaces.join(' ')"); do
            pkg=$(node -p "require('./$workspace/package.json').name")
            ver=$(node -p "require('./$workspace/package.json').version")
            published=$(npm view "$pkg@$ver" version 2>/dev/null || echo "")
            if [ -n "$published" ]; then
              UPDATES="$UPDATES $pkg@$ver"
            fi
          done
          echo "updates=$UPDATES" >> $GITHUB_OUTPUT

      - name: Update @enxoval/* in service
        working-directory: service
        run: |
          UPDATES="${{ steps.versions.outputs.updates }}"
          FILTERED=""
          for pkg in $UPDATES; do
            name=$(echo $pkg | cut -d@ -f1-2)
            if node -e "const p=require('./package.json'); process.exit(p.dependencies?.['$name'] || p.devDependencies?.['$name'] ? 0 : 1)" 2>/dev/null; then
              FILTERED="$FILTERED $pkg"
            fi
          done
          [ -z "$FILTERED" ] && echo "No matching deps, skipping" && exit 0
          npm install $FILTERED

      - name: Open PR if changed
        working-directory: service
        run: |
          git diff --quiet package.json package-lock.json && echo "No changes, skipping" && exit 0

          BRANCH="chore/bump-enxoval-${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/dune-lab/${{ matrix.repo }}.git"
          git checkout -b $BRANCH
          git add package.json package-lock.json
          git commit -m "chore: bump @enxoval/* to ${{ github.ref_name }}"
          git push origin $BRANCH
          gh pr create \
            --repo dune-lab/${{ matrix.repo }} \
            --head $BRANCH \
            --base main \
            --title "chore: bump @enxoval/* to ${{ github.ref_name }}" \
            --body "Automated bump of @enxoval/* packages after release ${{ github.ref_name }}. Only packages already listed as dependencies were updated."
        env:
          GH_TOKEN: ${{ secrets.DUNE_LAB_TOKEN }}
