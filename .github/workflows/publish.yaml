name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces

      - name: Publish all packages
        run: |
          for workspace in $(npm query .workspace --json | jq -r '.[].location'); do
            pkg=$(node -p "require('./$workspace/package.json').name")
            ver=$(node -p "require('./$workspace/package.json').version")
            published=$(npm view "$pkg@$ver" version 2>/dev/null || echo "")
            if [ -z "$published" ]; then
              echo "Publishing $pkg@$ver"
              npm publish "./$workspace" --access public
            else
              echo "Skipping $pkg@$ver (already published)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
