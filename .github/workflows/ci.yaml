name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check lock file is in sync
        run: |
          npm install --package-lock-only
          git diff --exit-code package-lock.json || (echo "::error::package-lock.json is out of sync — run 'npm install' locally and commit the updated lock file" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces
